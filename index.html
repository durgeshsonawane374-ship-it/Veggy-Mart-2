<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart - Premium Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Hind', sans-serif; background-color: #f8fafc; }
        .premium-card { border-radius: 35px; background: white; border: 1px solid #f1f5f9; transition: 0.3s; }
        .gradient-header { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="pb-40">

    <!-- Language & Delivery Top Bar -->
    <div class="bg-yellow-400 px-4 py-2 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-600 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-700"></span>
            </span>
            <p class="text-[10px] font-black uppercase text-green-900 tracking-tighter">Delivery in your area</p>
        </div>
        <select id="langSelect" class="bg-white/50 text-[10px] font-bold px-3 py-1 rounded-full border-none outline-none">
            <option>मराठी</option>
            <option>English</option>
            <option>Hindi</option>
        </select>
    </div>

    <!-- Premium Header -->
    <header class="gradient-header text-white pt-8 pb-12 px-6 rounded-b-[50px] shadow-xl relative text-center">
        <h1 class="text-4xl font-black italic text-yellow-300 tracking-tighter">VEGGY MART</h1>
        <div class="mt-3 inline-block bg-white/20 backdrop-blur-md px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">
            Fresh Organic Vegetables
        </div>
    </header>

    <!-- Bachat Combo (Horizontal) -->
    <div class="px-6 -mt-6 relative z-10">
        <h2 class="text-xs font-black text-gray-800 mb-3 flex items-center gap-2">
            🔥 Bachat Combos <span class="text-[8px] bg-red-500 text-white px-2 py-0.5 rounded-full">Save 20%</span>
        </h2>
        <div class="flex overflow-x-auto gap-4 no-scrollbar pb-2">
            <div class="min-w-[240px] premium-card p-4 shadow-lg border-2 border-green-100">
                <img src="1000391944.jpg" class="h-28 w-full object-cover rounded-2xl mb-3 shadow-inner">
                <h4 class="font-black text-gray-800 text-sm">Daily Tadka Mix</h4>
                <p class="text-[10px] text-gray-400 mb-2">कांदा + टोमॅटो + मिरची</p>
                <div class="flex justify-between items-center">
                    <span class="text-lg font-black text-green-700">₹99</span>
                    <button onclick="addCombo('Daily Tadka Mix', 99)" class="bg-green-600 text-white px-5 py-2 rounded-xl text-[10px] font-black shadow-md">+ ADD</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Section -->
    <div class="px-6 mt-8">
        <h2 class="text-xs font-black text-gray-800 mb-4 uppercase tracking-widest">All Vegetables</h2>
        <div id="product-list" class="grid grid-cols-1 gap-6">
            <!-- Products will be injected here -->
        </div>
    </div>

    <!-- Smart Billing Footer -->
    <div id="bill-footer" class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md p-6 rounded-t-[45px] shadow-[0_-15px_40px_rgba(0,0,0,0.1)] z-50 border-t border-gray-100 transition-transform duration-500 translate-y-full">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Total Bill</p>
                <p id="total-amount" class="text-3xl font-black text-green-700 leading-none">₹0</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 text-white px-10 py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all flex items-center gap-2">
                ऑर्डर द्या 🛒
            </button>
        </div>
    </div>

    <!-- Address Modal -->
    <div id="orderModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-gray-800 mb-6 text-center">पत्ता भरा 📍</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="तुमचे नाव" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl font-bold focus:ring-2 focus:ring-green-500 outline-none">
                <input type="tel" id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl font-bold focus:ring-2 focus:ring-green-500 outline-none">
                <textarea id="custAddr" placeholder="पूर्ण पत्ता" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl font-bold h-24 focus:ring-2 focus:ring-green-500 outline-none"></textarea>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg">WhatsApp वर पाठवा ✅</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-2 text-xs">मागे जा</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "KG", image: "1000391014.jpg", type: "weight" },
            { id: 2, name: "बटाटा", price: 35, unit: "KG", image: "1000391013.jpg", type: "weight" },
            { id: 3, name: "हिरवी मिरची", price: 60, unit: "KG", image: "1000391015.jpg", type: "weight" },
            { id: 4, name: "मेथी", price: 15, unit: "जुडी", image: "https://cdn-icons-png.flaticon.com/512/3014/3014431.png", type: "judi" },
            { id: 5, name: "कोथिंबीर", price: 10, unit: "जुडी", image: "https://cdn-icons-png.flaticon.com/512/3257/3257253.png", type: "judi" }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => {
                const isWeight = p.type === "weight";
                return `
                <div class="premium-card p-4 flex gap-4 items-center shadow-md">
                    <img src="${p.image}" class="w-20 h-20 object-cover rounded-2xl shadow-sm" onerror="this.src='https://via.placeholder.com/100'">
                    <div class="flex-1">
                        <h3 class="text-lg font-black text-gray-800">${p.name}</h3>
                        <p class="text-[10px] text-green-600 font-black mb-2">₹${p.price} / ${p.unit}</p>
                        
                        <div class="flex items-center gap-2">
                            <select onchange="handleCart(${p.id}, this.value, '${p.name}', ${p.price})" 
                                class="bg-gray-100 border-none text-[11px] font-black px-4 py-2 rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                                <option value="">निवडा</option>
                                ${isWeight ? `
                                    <option value="0.25">पावशेर (250g)</option>
                                    <option value="0.5">अर्धा किलो (500g)</option>
                                    <option value="1">एक किलो (1kg)</option>
                                ` : `
                                    <option value="1">१ जुडी</option>
                                    <option value="2">२ जुडी</option>
                                    <option value="3">३ जुडी</option>
                                `}
                            </select>
                            <span id="check-${p.id}" class="hidden text-green-600">✅</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function handleCart(id, val, name, price) {
            if (!val) {
                delete cart[id];
                document.getElementById(`check-${id}`).classList.add('hidden');
            } else {
                const qtyVal = parseFloat(val);
                const label = val >= 1 ? val + " " + products.find(x => x.id === id).unit : (val*1000) + "g";
                cart[id] = { name: name, qtyLabel: label, finalPrice: Math.round(price * qtyVal) };
                document.getElementById(`check-${id}`).classList.remove('hidden');
            }
            updateTotal();
        }

        function addCombo(name, price) {
            const id = 'combo1';
            cart[id] = { name: name, qtyLabel: '1 Pack', finalPrice: price };
            updateTotal();
            alert(name + " कार्टमध्ये ॲड केला!");
        }

        function updateTotal() {
            const footer = document.getElementById('bill-footer');
            let total = 0;
            for (let k in cart) total += cart[k].finalPrice;
            
            document.getElementById('total-amount').innerText = "₹" + total;
            
            if (total > 0) footer.classList.remove('translate-y-full');
            else footer.classList.add('translate-y-full');
        }

        function openModal() { document.getElementById('orderModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function confirmOrder() {
            const n = document.getElementById('custName').value;
            const m = document.getElementById('custMobile').value;
            const a = document.getElementById('custAddr').value;
            if(!n || !m || !a) return alert("कृपया पत्ता भरा!");

            let msg = `*🥦 VEGGY MART ORDER 🥦*%0A--------------------------%0A*ग्राहक:* ${n}%0A*मोबाईल:* ${m}%0A*पत्त्ता:* ${a}%0A--------------------------%0A%0A`;
            for(let id in cart) msg += `✅ *${cart[id].name}* (${cart[id].qtyLabel}) - ₹${cart[id].finalPrice}%0A`;
            msg += `%0A*एकूण बिल: ${document.getElementById('total-amount').innerText}*%0A%0A_शुद्ध आणि ताजी भाजी!_`;
            window.open(`https://wa.me/917385533059?text=${msg}`);
        }

        render();
    </script>
</body>
          </html>
