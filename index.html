<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggy Mart - Superfast Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Hind', sans-serif; background-color: #f3f4f6; }
        .premium-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1); }
        .qty-btn { transition: all 0.2s ease; }
        .qty-btn:active { scale: 0.9; }
        .gradient-bg { background: linear-gradient(135deg, #059669 0%, #065f46 100%); }
        /* Smooth scrolling for horizontal combos */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="pb-32">

    <!-- Top Urgency Bar -->
    <div class="bg-yellow-400 text-green-900 py-1.5 px-4 text-center text-[10px] font-black uppercase tracking-widest flex justify-center items-center gap-2">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-600 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-700"></span>
        </span>
        Delivery to your area in 15-20 Mins
    </div>

    <!-- Main Header -->
    <header class="gradient-bg text-white pt-6 pb-10 px-6 rounded-b-[40px] shadow-lg relative">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-yellow-300">VEGGY MART</h1>
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Fresh Organic Vegetables</p>
            </div>
            <div class="bg-white/20 p-2 rounded-full backdrop-blur-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
        <div class="bg-white text-green-800 py-2 px-4 rounded-full text-xs font-bold inline-flex items-center gap-2 shadow-inner">
            🚜 शेतातून थेट तुमच्या घरापर्यंत
        </div>
    </header>

    <!-- Combo Offers Section -->
    <div class="px-6 -mt-6 relative z-10">
        <h2 class="text-sm font-black text-gray-800 mb-3 flex items-center gap-2">
            🔥 Bachat Combos <span class="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-full animate-pulse">Save 20%</span>
        </h2>
        <div class="flex overflow-x-auto gap-4 no-scrollbar pb-4">
            <div class="min-w-[200px] bg-white p-4 rounded-3xl premium-shadow border border-green-100">
                <div class="h-24 w-full bg-green-50 rounded-2xl mb-3 flex items-center justify-center text-3xl">🥗</div>
                <h4 class="font-bold text-gray-800">Daily Tadka Mix</h4>
                <p class="text-[10px] text-gray-500">कांदा + टोमॅटो + मिरची</p>
                <div class="mt-2 flex justify-between items-center">
                    <span class="font-black text-green-700">₹99</span>
                    <button class="bg-green-600 text-white px-4 py-1 rounded-full text-[10px] font-bold">+ ADD</button>
                </div>
            </div>
            <!-- Add more combos here -->
        </div>
    </div>

    <!-- Product Grid -->
    <div class="px-6 mt-6">
        <h2 class="text-sm font-black text-gray-800 mb-4 uppercase tracking-wider">All Vegetables</h2>
        <div id="product-list" class="grid grid-cols-2 gap-4">
            <!-- Products injected by JS -->
        </div>
    </div>

    <!-- Professional Floating Cart -->
    <div id="cart-footer" class="fixed bottom-6 left-6 right-6 bg-green-700 text-white p-4 rounded-[30px] shadow-2xl flex justify-between items-center transform translate-y-32 transition-transform duration-500 z-[100]">
        <div>
            <p id="item-count" class="text-[10px] font-bold opacity-80">0 ITEMS</p>
            <p id="total-price" class="text-xl font-black leading-none">₹0</p>
        </div>
        <button onclick="openModal()" class="bg-white text-green-800 px-6 py-3 rounded-2xl font-black flex items-center gap-2 active:scale-95 transition-all">
            VIEW CART <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
            </svg>
        </button>
    </div>

    <!-- Address Modal (Same as before but cleaner) -->
    <div id="orderModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[200] hidden flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[40px] p-8 animate-slide-up">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <h2 class="text-2xl font-black text-gray-800 mb-6">Delivery Details 📍</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="तुमचे नाव" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                <input type="tel" id="custMobile" placeholder="मोबाईल नंबर" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
                <textarea id="custAddr" placeholder="पूर्ण पत्ता" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-green-500 outline-none h-24"></textarea>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-all">PLACE ORDER ✅</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold py-2 text-xs">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "टोमॅटो", price: 40, unit: "KG", image: "1000391014.jpg", save: 5 },
            { id: 2, name: "बटाटा", price: 35, unit: "KG", image: "1000391013.jpg", save: 3 },
            { id: 3, name: "हिरवी मिरची", price: 40, unit: "KG", image: "1000391015.jpg", save: 10 },
            { id: 4, name: "भेंडी", price: 30, unit: "KG", image: "1000391017.jpg", save: 4 },
            { id: 5, name: "वांगे", price: 50, unit: "KG", image: "1000391016.jpg", save: 8 }
        ];

        let cart = {};

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white rounded-[30px] p-3 border border-gray-100 premium-shadow relative overflow-hidden">
                    ${p.save ? `<div class="absolute top-0 right-0 bg-green-600 text-white text-[8px] font-black px-3 py-1 rounded-bl-xl shadow-md">SAVE ₹${p.save}</div>` : ''}
                    <div class="h-32 w-full mb-3 rounded-2xl overflow-hidden">
                        <img src="${p.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
                    </div>
                    <h3 class="text-sm font-black text-gray-800 leading-tight">${p.name}</h3>
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">${p.unit}</p>
                    <div class="flex justify-between items-center">
                        <span class="font-black text-lg text-gray-900">₹${p.price}</span>
                        <div id="btn-container-${p.id}">
                            <button onclick="addToCart(${p.id})" class="bg-white border-2 border-green-600 text-green-700 px-4 py-1 rounded-xl text-[10px] font-black hover:bg-green-600 hover:text-white transition-all">+ ADD</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart[id] = { ...p, qty: 1, totalPrice: p.price };
            updateQtyUI(id);
            updateCartFooter();
        }

        function changeQty(id, delta) {
            if (cart[id]) {
                cart[id].qty += delta;
                if (cart[id].qty <= 0) {
                    delete cart[id];
                    resetButton(id);
                } else {
                    cart[id].totalPrice = cart[id].qty * cart[id].price;
                    updateQtyUI(id);
                }
                updateCartFooter();
            }
        }

        function updateQtyUI(id) {
            const container = document.getElementById(`btn-container-${id}`);
            container.innerHTML = `
                <div class="flex items-center gap-2 bg-green-600 text-white rounded-xl px-2 py-1">
                    <button onclick="changeQty(${id}, -1)" class="font-black text-lg qty-btn">-</button>
                    <span class="text-xs font-black w-4 text-center">${cart[id].qty}</span>
                    <button onclick="changeQty(${id}, 1)" class="font-black text-lg qty-btn">+</button>
                </div>
            `;
        }

        function resetButton(id) {
            const container = document.getElementById(`btn-container-${id}`);
            container.innerHTML = `<button onclick="addToCart(${id})" class="bg-white border-2 border-green-600 text-green-700 px-4 py-1 rounded-xl text-[10px] font-black hover:bg-green-600 hover:text-white transition-all">+ ADD</button>`;
        }

        function updateCartFooter() {
            const footer = document.getElementById('cart-footer');
            const total = Object.values(cart).reduce((sum, item) => sum + item.totalPrice, 0);
            const count = Object.keys(cart).length;

            if (count > 0) {
                footer.classList.remove('translate-y-32');
                document.getElementById('total-price').innerText = `₹${total}`;
                document.getElementById('item-count').innerText = `${count} ITEM${count > 1 ? 'S' : ''}`;
            } else {
                footer.classList.add('translate-y-32');
            }
        }

        function openModal() { document.getElementById('orderModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function confirmOrder() {
            const n = document.getElementById('custName').value;
            const m = document.getElementById('custMobile').value;
            const a = document.getElementById('custAddr').value;
            if(!n || !m || !a) return alert("माहिती भरा!");

            let msg = `*🥦 VEGGY MART ORDER 🥦*%0A--------------------------%0A*ग्राहक:* ${n}%0A*मोबाईल:* ${m}%0A*पत्त्ता:* ${a}%0A--------------------------%0A%0A`;
            for(let id in cart) msg += `✅ *${cart[id].name}* (${cart[id].qty} Qty) - ₹${cart[id].totalPrice}%0A`;
            msg += `%0A*एकूण बिल: ${document.getElementById('total-price').innerText}*%0A%0A_15 मिनिटांत डिलिव्हरी!_`;
            window.open(`https://wa.me/917385533059?text=${msg}`);
        }

        render();
    </script>
</body>
              </html>
